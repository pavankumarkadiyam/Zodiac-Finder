<template>
    <!-- lightning record form -->
     <lightning-card title="Lightning Data Service Component">
        <h3 class = "slds-text-heading_small slds-p-horizontal_medium">
        {cardTiltle}
        </h3>
        <template lwc:if={isLightningFormEnabled}>
            <div class = "slds-m-around_medium">
                <lightning-record-form
                    record-id = {recordId}
                    object-api-name = {objectApiName}
                    fields = {fields}
                >
                </lightning-record-form>
            </div> 
        </template>
        <template lwc:elseif={isLightningViewFormEnabled}>
            <lightning-record-view-form
                record-id = {recordId}
                object-api-name = {objectApiName}
            >
                <div class="slds-p-around_medium slds-grid slds-wrap">
                    <template for:each={fields} for:item="field">
                        <div key={field} class="slds-col slds-size_1-of-2">
                        <lightning-output-field field-name={field}></lightning-output-field>
                    </div>
                    </template>
                </div>
            </lightning-record-view-form>
        </template>
        <div class = "slds-grid slds-wrap slds-m-around_medium">
            <div class="slds-col slds-size_1-of-2">
                    <lightning-button variant="brand" label="Show Lightning Record Form" class="slds-m-around_medium" onclick={handleShowLightningForm} ></lightning-button>
            </div>
            <div class="slds-col slds-size_1-of-2">
                <lightning-button variant="brand" label="Show Lightning Rec View Form" class="slds-m-around_medium" onclick={handleShowLightningViewForm}></lightning-button>
            </div>
        </div>
    </lightning-card>  
</template>
