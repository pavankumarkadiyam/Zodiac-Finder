<template>
    <lightning-card title="Edit Record with Lightning Edit Record Form">
        <div class="slds-p-around_small">
                    <lightning-record-edit-form
            record-id={recordId}
            object-api-name={objectApiName}
        >
            <lightning-messages></lightning-messages>
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name="CaseNumber">

                    </lightning-input-field>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name="Subject">
                        
                    </lightning-input-field>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name="Status">
                        
                    </lightning-input-field>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name="Origin">
                        
                    </lightning-input-field>
                </div>
                <div class="slds-col slds-size_2-of-2">
                    <lightning-input-field field-name="AccountId">

                    </lightning-input-field>
                </div>
                 <div class="slds-col slds-size_1-of-2">
                    <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
                </div>
            </div>
        </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
