<template>
    <lightning-card title ="Know Your Zodiac" class="slds-m-around_x-small">
        <div class="slds-m-around_x-small">
            <lightning-layout multiple-rows="true">
                <lightning-layout-item size="12" padding="around-small">
                    <lightning-input type="text" label="Name" onchange={handleNameChange}></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                    <lightning-input type="date" label="Date of Birth" onchange={handleDateChange}></lightning-input>
                </lightning-layout-item>
            </lightning-layout>
            <div class="slds-align_absolute-center container-height">
                <lightning-button variant="brand" label="Find My Zodiac Sign" onclick={getZodiacDetails}></lightning-button>
            </div>
        </div>
    </lightning-card>
    <template if:true={showZodiac}>
        <lightning-card title="Your Zodiac Sign" class="slds-m-around_x-small">
            <div class="slds-m-around_x-small">
                <p class="slds-text-body_regular">Hi {userName}, based on your {userDateOfBirth} your zodiac sign and triat is <br>
                Zodiac: {zodiacSign}<br>
                Trait: {zodiacTrait}
            </p>
            </div>
        </lightning-card>
    </template>
</template>
